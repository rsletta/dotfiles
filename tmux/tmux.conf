# set bash as your default Tmux shell
set-option -g default-shell /bin/zsh

# improve colors
set -sa terminal-overrides ",xterm*:Tc"

# Forward extended key sequences (Shift+Enter, etc.) to applications
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'

# Change prefix key to C-a, easier to type, same to "screen"
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Put status bar on top
set-option -g status-position bottom

# Set parent terminal title to reflect current window in tmux session
set -g set-titles on
set -g set-titles-string "#I:#W"

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable passthrough som messages reach outer terminal
set -g allow-passthrough on

# mouse mode on
set -g mouse on

# Disable pane focus change on mouse click
unbind-key -T root MouseDown1Pane

# Allow drag to copy without redundant triggers
unbind-key -T root MouseDrag1Pane
bind-key -T root MouseDrag1Pane copy-mode \; send-keys -X begin-selection

# Disable focus shift for scrolling
unbind-key -T root WheelUpPane
unbind-key -T root WheelDownPane

# don't rename my windows
set-option -g automatic-rename off

# increase scrollback lines
set -g history-limit 10000

# rebind copy mode
bind a copy-mode

# act like vim
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind 'M-C-RIGHT' select-pane -R
bind 'M-C-LEFT' select-pane -L
bind 'M-C-UP' select-pane -U
bind 'M-C-DOWN' select-pane -D
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Window pane commands
bind c new-window -c "#{pane_current_path}"
bind UP split-window -b -c "#{pane_current_path}"
bind DOWN split-window -c "#{pane_current_path}"
bind LEFT split-window -b -h -c "#{pane_current_path}"
bind RIGHT split-window -h -c "#{pane_current_path}"
bind C new-window
bind '_' split-window -v
bind '|' split-window -h

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# don't suspend-client
unbind-key C-z

# Safely source local tmux configuration only if it exists
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

# Reload tmux configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded"

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment SHELL_CONTEXT
set -ga update-environment CONTEXT_ENV

# Plugin config - keep at bottom of .tmux.conf
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # https://github.com/tmux-plugins/tmux-sensible
set -g @plugin 'z3z1ma/tmux-gruvbox' # https://github.com/z3z1ma/tmux-gruvbox
set -g @plugin 'tmux-plugins/tmux-open' # https://github.com/tmux-plugins/tmux-open
set -g @plugin 'tmux-plugins/tmux-copycat' # https://github.com/tmux-plugins/tmux-copycat
set -g @plugin 'tmux-plugins/tmux-yank' # https://github.com/tmux-plugins/tmux-yank
set -g @tmux-gruvbox 'dark'
set -g @gruvbox_status_modules_left ""
set -g @gruvbox_status_modules_right "directory session"
set -g @gruvbox_window_default_text "#W"
set -g @gruvbox_window_current_text "#W"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
