# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """${custom.context}${custom.gh_account}${custom.git_user}$aws$kubernetes${custom.alvtime_profile}$line_break$directory$git_branch$git_status$character"""

command_timeout = 2000

# Disable the blank line at the start of the prompt
add_newline = false

palette = 'rsletta'

[palettes.rsletta]
codex_blue = '117'

[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# configure directory
[directory]
read_only = " ¾░īŠ"
truncation_length = 3
truncate_to_repo = true    # truncates directory to root folder if in github repo
style = "bold italic blue"

[kubernetes]
disabled = false
format = '[\[k8s:$context\]]($style)  '
style = "dimmed blue"

[[kubernetes.contexts]]
context_pattern = "arn:aws:eks:eu-north-1:891377046560:cluster/eks-cluster-dev"
style = "green"
context_alias = "spenn-dev"

[aws]
symbol = ""
format = '[\[aws:$profile\]]($style)  '

[docker_context]
symbol = ""
format = '[\[docker:$context\]]($style)  '
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[git_branch]
symbol = ""
format = "[$symbol($branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)"
modified = "[${count}+](yellow)"
deleted = "[${count}-](red)"
conflicted = "[${count}~](red)"
ahead = "ŌćĪ${count}"
behind = "ŌćŻ${count}"
untracked = "[${count}?](blue)"
staged = "[${count}+](green)"

[git_state]
style = "bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[kotlin]
symbol = ""

[java]
symbol = ""
style = "#FC9867"

[memory_usage]
symbol = "¾░Źø  "

[lua]
symbol = "ŅśĀ "

[nodejs]
symbol = ""
format = "[$symbol($version)](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[package]
symbol = "¾░ÅŚ"

[python]
symbol = ""
#pyenv_version_name = true
format = '[${symbol}(${version})(\($virtualenv\))]($style) '
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[custom.context]
command = 'echo "${SHELL_CONTEXT}${CONTEXT_ENV:+:$CONTEXT_ENV}"'
when = '[ -n "$SHELL_CONTEXT" ]'
format = '[\[ctx:$output\]]($style)  '
style = 'bold yellow'
description = 'Active shell context and environment'

[custom.gh_account]
command = 'echo "$GH_USER"'
when = '[ -n "$GH_USER" ]'
format = '[\[gh:$output\]]($style)  '
style = 'dimmed green'
description = 'Active GitHub account'

[custom.git_user]
command = 'git config user.email'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
format = '[\[git:$output\]]($style)  '
style = 'dimmed purple'
description = 'Git user for current repo'

[custom.alvtime_profile]
command = 'echo "$_ALVTIME_PROFILE"'
when = '[ -n "$_ALVTIME_PROFILE" ] && [ "$_ALVTIME_PROFILE" != "ronnie" ]'
format = '[\[alvtime:$output\]](bold cyan)  '
description = "Show alvtime profile (cached in _ALVTIME_PROFILE)"
